---
default: &default
  prefix: '<%= ENV["DATACITE_PREFIX"]  ||  10.0000 %>'
  user: <%= ENV["DATACITE_USER"] || "" %>
  password: <%= ENV["DATACITE_PASSWORD"] || "" %>
  host: <%= ENV["DATACITE_HOST"] || "api.datacite.org" %>
  doi_url: "https://handle.test.datacite.org/"
  data_commons_url: "https://datacommons.princeton.edu/discovery"
  describe_data_commons_url: "https://datacommons.princeton.edu/describe"
production:
  <<: *default
  doi_url: "https://doi.org/"
staging:
  <<: *default
  data_commons_url: "https://pdc-discovery-staging.princeton.edu/discovery"
  describe_data_commons_url: "https://pdc-discovery-staging.princeton.edu/describe"
development:
  <<: *default
  data_commons_url: "http://localhost:3000"
  describe_data_commons_url: "http://localhost:3000"
test:
  <<: *default

---
version: 2.1

orbs:
  browser-tools: circleci/browser-tools@2.4.0
  coveralls: coveralls/coveralls@2.2.5
commands:
  bundle_install:
    description: "Install correct version of bundler and load from cache or bundle install"
    steps:
      # Restore bundle cache
      - restore_cache:
          keys:
            - pdc_describe-{{ checksum "Gemfile.lock" }}-{{ checksum "yarn.lock" }}
      - run:
          name: Update bundler
          command: |
            echo 'export BUNDLER_VERSION=2.3.11' >> $BASH_ENV
            gem install bundler -v 2.3.11
      - run:
          name: Install dependencies
          command: bundle check --path=vendor/bundle || bundle install --path=vendor/bundle --jobs 4 --retry 3
      - save_cache:
          key: pdc_describe-{{ checksum "Gemfile.lock" }}-{{ checksum "yarn.lock" }}
          paths:
            - ./vendor/bundle
  yarn_install:
    description: "Install the supported release of Yarn and install the package dependencies"
    steps:
      - run:
          name: Enable corepack and set the supported release of Yarn as the default
          command: sudo corepack enable && yarn set version berry
      - restore_cache:
          name: Restore the Yarn package dependencies from the cache
          keys:
            - pdc_describe-yarn-{{ checksum "yarn.lock" }}
      - run:
          name: Install NPM Dependencies via Yarn
          command: yarn install --immutable
      - save_cache:
          name: Save Yarn Package Cache
          key: pdc_describe-yarn-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn

jobs:
  build:
    working_directory: ~/pdc_describe
    docker:
      - &ruby_docker
        image: cimg/ruby:3.3.7-browsers
        environment:
          RAILS_ENV: test
    steps:
      - checkout
      - run: sudo apt update && sudo apt install postgresql-client libmsgpack-dev
      - bundle_install
      - yarn_install
      - persist_to_workspace:
          root: &root "~/pdc_describe"
          paths: "*"

  rubocop:
    working_directory: *root
    docker:
      - *ruby_docker
    steps:
      - attach_workspace:
          at: *root
      - run:
          name: Run rubocop
          command: bundle exec rubocop

  eslint:
    # We don't actually need any of the ruby environment to lint JS... but use what we have for now.
    working_directory: ~/pdc_describe
    docker:
      - image: cimg/ruby:3.3.7-browsers
        environment:
          RAILS_ENV: test
    steps:
      - attach_workspace:
          at: "~/pdc_describe"
      - bundle_install
      - yarn_install
      - run:
          name: Run prettier
          command: yarn run prettier --check .
      - run:
          name: Run eslint
          command: yarn lint

  test:
    working_directory: *root
    docker:
      - *ruby_docker
      - image: postgres:15-alpine
        environment:
          POSTGRES_USER: pdc_describe_user
          POSTGRES_DB: test_db
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - attach_workspace:
          at: *root
      - browser-tools/install_firefox
      - run:
          name: Wait for PostgreSQL
          command: dockerize -wait tcp://localhost:5432 -timeout 1m
      - run: bundle exec rake db:create RAILS_ENV=test
      - run: bundle exec rake db:migrate RAILS_ENV=test
      - run:
          name: Run Rspec
          command: bundle exec rspec spec
      - store_artifacts:
          path: ~/pdc_describe/coverage
      - coveralls/upload

workflows:
  version: 2
  build_accept_deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - rubocop:
          requires:
            - build
      - eslint:
          requires:
            - build
